name: release

# On every push to main: compute next version (minor+1), tag it, then a native
# build matrix produces one raw binary per (os, arch). The publish job downloads
# all binaries, computes checksums.txt, and publishes a GitHub Release with raw
# binaries (no archives). The in-app updater fetches checksums.txt to verify
# SHA256 before self-applying.
on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, goos: windows, goarch: amd64, ext: .exe, cgo: 1 }
          - { os: macos-latest,   goos: darwin,  goarch: amd64,         cgo: 1 }
          - { os: macos-latest,   goos: darwin,  goarch: arm64,         cgo: 1 }
          - { os: ubuntu-latest,  goos: linux,   goarch: amd64,         cgo: 0 }
          - { os: ubuntu-latest,  goos: linux,   goarch: arm64,         cgo: 0 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Compute next version (minor bump)
        id: ver
        run: |
          set -euo pipefail
          latest=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo "")
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            major=$(echo "$latest" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+).*/\1/')
            minor=$(echo "$latest" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+).*/\2/')
            next="v${major}.$((minor+1)).0"
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
      - name: Build raw binary (native)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          mkdir -p dist
          go build -ldflags "-s -w -X cc2ws/internal/core.Version=${{ steps.ver.outputs.version }}" \
            -o "dist/cc2ws-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" ./cmd/cc2ws
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc2ws-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/cc2ws-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute next version
        id: ver
        run: |
          set -euo pipefail
          latest=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo "")
          if [ -z "$latest" ]; then next="v0.1.0"; else
            major=$(echo "$latest" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+).*/\1/')
            minor=$(echo "$latest" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+).*/\2/')
            next="v${major}.$((minor+1)).0"; fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.version }}"
          git push origin "${{ steps.ver.outputs.version }}"
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Compute checksums.txt
        run: |
          cd dist
          sha256sum cc2ws-* | sort -k2 > checksums.txt
          cat checksums.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: |
            dist/cc2ws-*
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
