name: release

# On every push to main: compute next version (minor+1), tag it, then a native
# build matrix produces one raw binary per (os, arch) plus a macOS .dmg bundle.
# The publish job downloads them, computes checksums.txt over the raw binaries,
# and publishes a GitHub Release. The in-app updater fetches the raw binary for
# its GOOS/GOARCH and verifies it against checksums.txt before self-applying.
# No zip/tar.gz archives: Windows ships a GUI .exe, Linux a raw TUI binary,
# macOS a .dmg (with the .app inside) for drag-to-Applications.
on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, goos: windows, goarch: amd64, ext: .exe, cgo: 1, gui_ldflag: "-H=windowsgui" }
          - { os: macos-latest,   goos: darwin,  goarch: amd64,         cgo: 1, gui_ldflag: "" }
          - { os: macos-latest,   goos: darwin,  goarch: arm64,         cgo: 1, gui_ldflag: "" }
          - { os: ubuntu-latest,  goos: linux,   goarch: amd64,         cgo: 0, gui_ldflag: "" }
          - { os: ubuntu-latest,  goos: linux,   goarch: arm64,         cgo: 0, gui_ldflag: "" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./...
      - name: Compute next version (minor bump)
        id: ver
        run: |
          set -euo pipefail
          latest=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo "")
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            major=$(echo "$latest" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+).*/\1/')
            minor=$(echo "$latest" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+).*/\2/')
            next="v${major}.$((minor+1)).0"
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
      - name: Build raw binary (native)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          mkdir -p dist
          go build -ldflags "-s -w ${{ matrix.gui_ldflag }} -X cc2ws/internal/core.Version=${{ steps.ver.outputs.version }}" \
            -o "dist/cc2ws-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" ./cmd/cc2ws
      - name: Package macos .dmg
        if: matrix.goos == 'darwin'
        continue-on-error: true
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          mkdir -p stage/cc2ws.app/Contents/MacOS stage/cc2ws.app/Contents/Resources
          cp dist/cc2ws-darwin-${{ matrix.goarch }} stage/cc2ws.app/Contents/MacOS/cc2ws
          chmod +x stage/cc2ws.app/Contents/MacOS/cc2ws
          cat > stage/cc2ws.app/Contents/Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          <key>CFBundleExecutable</key><string>cc2ws</string>
          <key>CFBundleIdentifier</key><string>io.cc2ws.app</string>
          <key>CFBundleName</key><string>cc2ws</string>
          <key>CFBundleVersion</key><string>$VER</string>
          <key>CFBundleShortVersionString</key><string>$VER</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          EOF
          mkdir -p dmgstage
          cp -R stage/cc2ws.app dmgstage/
          ln -s /Applications dmgstage/Applications
          hdiutil create -volname cc2ws -srcfolder dmgstage -ov -format UDZO "dist/cc2ws-darwin-${{ matrix.goarch }}.dmg"
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc2ws-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/cc2ws-${{ matrix.goos }}-${{ matrix.goarch }}*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute next version
        id: ver
        run: |
          set -euo pipefail
          latest=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo "")
          if [ -z "$latest" ]; then next="v0.1.0"; else
            major=$(echo "$latest" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+).*/\1/')
            minor=$(echo "$latest" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+).*/\2/')
            next="v${major}.$((minor+1)).0"; fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.version }}"
          git push origin "${{ steps.ver.outputs.version }}"
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Compute checksums.txt
        run: |
          cd dist
          # Only the raw binaries (the self-updater downloads these by exact
          # name and verifies against this file). Package archives are excluded.
          sha256sum cc2ws-windows-amd64.exe cc2ws-linux-amd64 cc2ws-linux-arm64 \
                    cc2ws-darwin-amd64 cc2ws-darwin-arm64 | sort -k2 > checksums.txt
          cat checksums.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: |
            dist/cc2ws-*
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
